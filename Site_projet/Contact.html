<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gladiator - Contact</title>
    <link rel="stylesheet" href="stylesiteprojet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

    
    <div class="saga_entière">
        <a href="Accueil.html">
            <img src="Gladiator_logo.png" width="130px" alt="Logo Gladiator">
        </a>
        <a href="Saga_entiere.html" class="lien_nav">Saga entière</a>
        <a href="Histoire.html" class="lien_nav">Histoire</a>
        <a href="Contact.html" class="lien_nav">Contact</a>
    </div>

   
    <div class="contenu">

        <h1 class="Titre_Accueil">Contact</h1>
        <p class="contact_intro">Une question ? Une remarque ? Écrivez-nous !</p>

        
        <div class="formulaire_container">

            <div class="champ">
                <label class="champ_label" for="nom">Nom</label>
                <input class="champ_input" type="text" id="nom" placeholder="Votre nom">
            </div>

            <div class="champ">
                <label class="champ_label" for="prenom">Prénom</label>
                <input class="champ_input" type="text" id="prenom" placeholder="Votre prénom">
            </div>

            <div class="champ">
                <label class="champ_label" for="email">Email</label>
                <input class="champ_input" type="email" id="email" placeholder="votre@email.com">
            </div>

            <div class="champ">
                <label class="champ_label" for="sujet">Sujet</label>
                <input class="champ_input" type="text" id="sujet" placeholder="Sujet de votre message">
            </div>

            <div class="champ">
                <label class="champ_label" for="message">Message</label>
                <textarea class="champ_textarea" id="message" placeholder="Votre message..."></textarea>
            </div>

            <button class="formulaire_bouton">Envoyer</button>

        </div>

    </div>


    <footer class="footer">
        <div class="footer_contenu">
            <img src="Gladiator_logo.png" width="80px" alt="Logo Gladiator">
            <p class="footer_texte">© 2026 Gladiator — Tous droits réservés</p>
            <a href="Contact.html" class="footer_bouton">Nous contacter</a>
        </div>
        <div class="footer_bas">
            <p class="footer_auteur">Massimo Carota</p>
            <a href="Auteur.html" class="footer_lien_auteur">Auteur</a>
        </div>
    </footer>

</body>
</html>
